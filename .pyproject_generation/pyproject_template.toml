[build-system]
requires = ["setuptools>=82"]
build-backend = "setuptools.build_meta"

[project]
readme = "README.md"
authors = [
    { name = "German Human Genome Phenome Archive (GHGA)", email = "contact@ghga.de" },
]
requires-python = ">=3.13"
license = { text = "Apache 2.0" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Software Development :: Libraries",
    "Intended Audience :: Developers",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
exclude = [
    ".git",
    ".devcontainer",
    "__pycache__",
    "build",
    "dist",
]
line-length = 88
src = ["src", "tests", "examples", "scripts"]
target-version = "py313"

[tool.ruff.lint]
fixable = [
    "UP", # e.g. List -> list
    "I", # sort imports
    "D", # pydocstyle
    "RUF022", # sort items in __all__
]
ignore = [
    # Rules that conflict with ruff-format, kept in sync with Ruff's
    # "formatter-incompatible rules" list:
    # https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
    "E111", # indentation with invalid multiple (for formatter)
    "E114", # indentation with invalid multiple comment (for formatter)
    "E116", # unexpected indentation of comment (for formatter)
    "E117", # over-indented (for formatter)
    "E501", # line too long
    "W191", # tab indentation (for formatter)
    "PLW", # pylint warnings
    "RUF001", # ambiguous unicode character strings
    "RUF010", # explicit conversion to string or repr: !s or !r
    "RUF012", # mutable class variables need typing.ClassVar annotation
    "N818", # Errors need to have Error suffix
    "B008", # function call in arg defaults,
    "PLR2004", # magic numbers should be constants
    "D205", # blank-line-after-summary
    "D400", # first doc line ends in period
    "D401", # non-imperative-mood
    "D107", # missing docstring in __init__
    "D206", # indent-with-spaces (for formatter)
    "D300", # triple-single-quotes (for formatter)
    "UP040", # type statement (not yet supported by mypy)
    "PLC0206", # Extracting value from dictionary without calling `.items()`
]
select = [
    "C90", # McCabe Complexity
    "F", # pyflakes codes
    "I", # isort
    "S", # flake8-bandit
    "B", # flake8-bugbear
    "N", # pep8-naming
    "UP", # pyupgrade
    "PL", # pylint
    "RUF", # ruff
    "SIM", # flake8-simplify
    "D", # pydocstyle
    "E", # pycodestyle errors (E402 import-not-at-top, E721 type ==, E731 lambda assign)
    "W", # pycodestyle warnings, incl. W605 invalid escape sequence (e.g. in regexes)
    "ASYNC", # flake8-async, catches blocking calls inside async def (high value for async services)
    "LOG", # flake8-logging, logging-call correctness
    "PERF", # perflint, cheap performance anti-patterns
    "RET", # flake8-return, small mechanical return-statement cleanups
    "C4", # flake8-comprehensions, mechanical comprehension cleanups
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["PL", "S", "SIM", "D", "E402"] # scripts may do path setup before imports
"tests/*" = ["S", "SIM", "PLR", "B011"]
".devcontainer/*" = ["S", "SIM", "D"]
"examples/*" = ["S", "D"]
"__init__.py" = ["D"]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.mypy]
disable_error_code = "import"
show_error_codes = true
exclude = [
    'build/lib/',
]
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = true
no_site_packages = false

[tool.pytest.ini_options]
minversion = "9.0"
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.paths]
source = [
    "src",
    "/workspace/src",
    "**/lib/python*/site-packages",
]

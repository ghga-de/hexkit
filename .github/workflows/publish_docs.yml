name: Publish docs via GH pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment,
# skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for accurate page timestamps and git refs

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install --no-deps -r ./lock/requirements-dev.txt
          # great-docs (Python >= 3.11 only) is kept out of the shared dev lock so it
          # does not break the py310 test env; install it here where docs are built.
          pip install great-docs==0.14.1

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build docs with Great Docs
        run: great-docs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./great-docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

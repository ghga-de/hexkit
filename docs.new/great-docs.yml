# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

# Display Name
# ------------
display_name: Hexkit

# Source Link Configuration
# -------------------------
# hexkit's sources live under src/hexkit relative to the git repo root (one level
# above this docs.new/ project root), so point "view source" links at that path.
source:
  path: src/hexkit

# Module Name (optional)
# ----------------------
# hexkit lives at the repo root (src/hexkit), but this great-docs project root
# is docs.new/, so we name the importable module explicitly. hexkit is installed
# (editable) in the environment, so introspection imports it directly.
module: hexkit

# Docstring Parser
# ----------------
# The docstring format used in your package (numpy, google, or sphinx)
parser: google

# Dynamic Introspection
# ---------------------
# Use runtime introspection for more accurate documentation (default: true)
# Set to false if your package has cyclic alias issues (e.g., PyO3/Rust bindings)
dynamic: true

# API Discovery Settings
# ----------------------
# Exclude items from auto-documentation
# exclude:
#   - InternalClass
#   - helper_function

# Logo & Favicon
# ---------------
# Point to a single logo file (replaces the text title in the navbar):
# logo: assets/logo.svg
#
# For light/dark variants:
# logo:
#   light: assets/logo-light.svg
#   dark: assets/logo-dark.svg
#
# To show the text title alongside the logo, add: show_title: true

# Author Information
# ------------------
# Author metadata for display in the landing page sidebar
# You can add additional fields: github, orcid, affiliation, homepage
authors:
  - name: German Human Genome Phenome Archive (GHGA)
    role: Author
    # affiliation:
    email: contact@ghga.de
    # github:
    # orcid:
    # homepage:

# Funding / Copyright Holder
# --------------------------
# Credit the organization that funds or holds copyright for this package.
# Displays in sidebar and footer. Homepage and ROR provide links.
# funding:
#   name: "Posit Software, PBC"
#   roles:
#     - Copyright holder
#     - funder
#   homepage: https://posit.co
#   ror: https://ror.org/03wc8by49

# User Guide (narrative docs)
# ---------------------------
# Explicit sidebar ordering that mirrors the previous MkDocs nav. Paths are
# relative to the user_guide/ directory.
# NOTE: great-docs' user_guide sidebar supports only a single level of sections
# (a `section:` nested inside another section's `contents:` is silently dropped).
# Rather than spread providers across many sibling sections, all providers live
# under one "Providers" section with a single page per backend; the individual
# providers of each backend are in-page sections, navigable via the on-this-page
# (right-hand) TOC.
user_guide:
  - section: "Overview"
    contents:
      - text: "Introduction"
        href: index.qmd
  - section: "Architecture Concepts"
    contents:
      - arch_concepts/overview.qmd
      - arch_concepts/hexagonal_arch.qmd
      - arch_concepts/triple_hexagonal_arch.qmd
      - arch_concepts/event_driven_arch.qmd
      - arch_concepts/dlq.qmd
  - section: "Library Structure and Conventions"
    contents:
      - structure/overview.qmd
  - section: "Protocols"
    contents:
      - protocols/overview.qmd
  - section: "Providers"
    contents:
      - text: "Overview"
        href: providers/overview.qmd
      - providers/kafka.qmd
      - providers/mongodb.qmd
      - providers/mongokafka.qmd
      - providers/s3.qmd
      - providers/redis.qmd
      - providers/testing.qmd
      - providers/vault.qmd
  - section: "Observability Tools"
    contents:
      - observability_tools/overview.qmd
      - observability_tools/correlation_ids.qmd
      - observability_tools/logging.qmd
  - section: "Developer Help"
    contents:
      - developer_help/overview.qmd
      - developer_help/outbox_v_persistent_pub.qmd
      - developer_help/testing.qmd
  - section: "Glossary"
    contents:
      - glossary/index.qmd

# API Reference Structure
# -----------------------
# Customize the sections below to organize your API documentation.
# - Reorder items within a section to change their display order
# - Move items between sections or create new sections
# - Use 'members: false' to exclude methods from documentation
# - Add 'desc:' to sections for descriptions

# Curated to mirror the breadth of the previous pdoc reference: top-level
# introspection only finds a handful of public names, so the provider and
# protocol classes (which live in submodules) are listed explicitly here.
reference:
  - title: Core Types & Base Classes
    desc: Shared type aliases and provider base classes
    contents:
      - custom_types.ID
      - custom_types.JsonObject
      - custom_types.Ascii
      - custom_types.AsyncConstructable
      - custom_types.AsyncContextConstructable
      - custom_types.KafkaCompressionType
      - custom_types.PytestScope
      - base.InboundProviderBase

  - title: General Utilities
    desc: Dependency-light helper functions and related errors
    contents:
      - utils.calc_part_size
      - utils.check_ascii
      - utils.validate_fields_in_model
      - utils.round_datetime_to_ms
      - utils.now_utc_ms_prec
      - utils.FieldNotInModelError
      - utils.NonAsciiStrError

  - title: Correlation IDs
    desc: Correlation-ID context management and helpers
    contents:
      - correlation.get_correlation_id
      - correlation.new_correlation_id
      - correlation.validate_correlation_id
      - correlation.correlation_id_from_str
      - correlation.set_context_var
      - correlation.set_correlation_id
      - correlation.set_new_correlation_id
      - correlation.CorrelationIdContextError
      - correlation.InvalidCorrelationIdError

  - title: OpenTelemetry
    desc: Observability / tracing configuration
    contents:
      - opentelemetry.OpenTelemetryConfig
      - opentelemetry.configure_opentelemetry

  - title: Logging
    desc: Structured logging configuration and formatters
    contents:
      - log.LoggingConfig
      - log.configure_logging
      - log.JsonFormatter
      - log.RecordCompiler

  - title: Protocols — Events
    desc: Ports for event publishing and subscription
    contents:
      - protocols.eventpub.EventPublisherProtocol
      - protocols.eventsub.EventSubscriberProtocol
      - protocols.eventsub.DLQSubscriberProtocol

  - title: Protocols — Data Access Objects
    desc: Ports for DAOs and outbox publishing/subscription
    contents:
      - protocols.dao.Dao
      - protocols.dao.DaoFactoryProtocol
      - protocols.dao.DaoFactoryBase
      - protocols.dao.FindResult
      - protocols.daopub.DaoPublisher
      - protocols.daopub.DaoPublisherFactoryProtocol
      - protocols.daosub.DaoSubscriberProtocol
      - protocols.daosub.DtoValidationError
      - protocols.dao.DaoError
      - protocols.dao.ResourceNotFoundError
      - protocols.dao.ResourceAlreadyExistsError
      - protocols.dao.UniqueConstraintViolationError
      - protocols.dao.FindError
      - protocols.dao.InvalidFindMappingError
      - protocols.dao.MultipleHitsFoundError
      - protocols.dao.NoHitsFoundError
      - protocols.dao.DbTimeoutError

  - title: Protocols — Storage
    desc: Ports for key-value and object storage
    contents:
      - protocols.kvstore.KeyValueStoreProtocol
      - protocols.objstorage.ObjectStorageProtocol
      - protocols.objstorage.PresignedPostURL

  - title: Provider — Apache Kafka
    desc: Event pub/sub backed by Apache Kafka
    contents:
